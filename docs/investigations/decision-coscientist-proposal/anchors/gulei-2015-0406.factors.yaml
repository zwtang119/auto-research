      历史侧：调查报告认定的直接原因链——开工引料波动引发液击，存在焊接缺陷的
      21 号焊口断裂，泄漏物料被鼓风机吸入风道经空气预热器进入炉膛被高温引爆，
      爆炸力撞裂 67.5m 外 607/608/609/610 四个储罐并引燃罐内物料。
    quantified_threshold: >
      推演阈值（N≥100 次运行）：P(furnace_explosion | leak) ≥ 0.70，
      且其后 ≥1 个 cascade 火节点实例化率 ≥ 0.85（对齐 seed tank_fire 节点概率 0.85）。
      历史锚：报告确认 4/4 个储罐在初始爆炸后爆裂燃烧（链全部实例化）。
    settlement_rule: >
      supported：推演路径实例化率满足上述阈值区间，且历史报告确认同构因果链
      （泄漏→炉膛引爆→撞裂储罐→罐火）；
      rejected：推演 P(furnace_explosion | leak) < 0.30 或 cascade 实例化率 < 0.50，
      即推演认为该链不太可能，与史实的确定性发生矛盾；
      inconclusive：推演事件链拓扑不含 leak/furnace_explosion 节点，
      或调查报告直接原因章节不可得。
    counter_signal: >
      若调查再核查认定起爆点不在炉膛（如罐区静电/雷击直接起火），
      或推演多数运行中泄漏仅形成流淌火而不引爆，则此前兆链被证伪。
