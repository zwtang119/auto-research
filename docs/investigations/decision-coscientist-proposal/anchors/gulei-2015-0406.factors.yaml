# 2. match_id 语义：schema 描述为 "Match identifier"；灾害域无"比赛"，本文件复用该字段
#    承载事件 ID（gulei-2015-0406）。建议 fork 改名 event_id（可向后兼容）。
# 3. direction 语义：schema 示例为 increases_home_win_probability（单一输赢结局）。
#    灾害域无单一终值，本文件约定 direction 显式携带指标 key：
#    increases_/decreases_<metric_key>（metric_key 取自 seed metricProfile 的 aiField）。
# 4. settlement_rule 语义：体育域为"赛后单一证据→三态"；灾害域证据=历史锚值（区间、
#    多口径），判定对象=推演分布。本文件统一采用百分位区间语言：
#    supported ⇔ 历史锚区间与推演分布 [P25,P75] 相交且方向/机制一致；
#    rejected  ⇔ 历史锚落在推演 [P5,P95] 之外或机制被证伪；
#    inconclusive ⇔ 推演未产出该可观测量 / 历史锚口径无法对齐 / 单一来源无法交叉验证。
# 5. 新增字段 sim_hook：显式声明推演侧挂钩（事件链节点/干预维度/指标 key）。
#    schema 无此字段；参照实例（wc2026-a-m01）同样使用了 schema 外字段
#    （settled_at_utc、evidence_summary、protocol_failure_logged），判为可容忍扩展，
#    建议灾害域 fork 将 sim_hook 收编为正式字段。
# 6. adjudicator 需新增盲评字段：灾害域因子从历史结局反推，专家盲评必须隐去结局，
#    schema 无 outcome_visibility/blinded 字段，暂在 required_independence 字符串内声明。
# 7. data_sources 需要来源分级：官方调查报告 / 媒体 / 工程规范 / seed 设计包络的
#    证据力不同，schema 只有扁平 list[string]，分级信息暂以源 ID 前缀体现
#    （official_*/media_*/eng_*/seed_*），建议 source_ledger 增加 reliability tier。
