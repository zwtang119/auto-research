# 每日市场快照自动更新
# UTC 00:00 定时运行 fetch_market_snapshot.py，commit 变更并 push to main，
# 触发 pages.yml 重建站点。

name: Market Snapshot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    name: Fetch Market Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch snapshot
        run: python3 scripts/fetch_market_snapshot.py
        continue-on-error: true
        id: fetch

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/processed/market_public_snapshot.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Snapshot updated."
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/market_public_snapshot.json
          git commit -m "chore(daily): update market snapshot $(date -u +%Y-%m-%d)"
          git push origin main

      - name: Report failure
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "::warning::Market snapshot fetch failed. Site will continue using the previous snapshot."
