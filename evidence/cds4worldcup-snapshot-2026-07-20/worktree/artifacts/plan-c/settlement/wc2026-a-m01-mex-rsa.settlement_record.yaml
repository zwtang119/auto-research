scores:
  brier: 0.3078
  log_loss: 0.5978
  brier_calculation: >
    Brier Score (multi-class, single observation):
    p = [home_win=0.55, draw=0.27, away_win=0.18]
    o = [home_win=1, draw=0, away_win=0]
    BS = (0.55-1)^2 + (0.27-0)^2 + (0.18-0)^2
       = 0.2025 + 0.0729 + 0.0324
       = 0.3078
  log_loss_calculation: >
    Log Loss (multi-class, single observation, epsilon=1e-12):
    LL = -[1*log(0.55+1e-12) + 0*log(0.27+1e-12) + 0*log(0.18+1e-12)]
       = -ln(0.55)
       = -(-0.5978...)
       = 0.5978
  calculation_snippet: |
    # Python verification:
    import math
    p = [0.55, 0.27, 0.18]  # predicted: home_win, draw, away_win
    outcome_index = 0        # home_win happened
    # Brier Score
    brier = sum((p[i] - (1 if i == outcome_index else 0))**2 for i in range(3))
    assert abs(brier - 0.3078) < 0.0001, f"Brier mismatch: {brier}"
    # Log Loss
    epsilon = 1e-12
    log_loss = -math.log(p[outcome_index] + epsilon)
    assert abs(log_loss - 0.5978) < 0.001, f"Log Loss mismatch: {log_loss}"
    print(f"Brier: {brier:.4f}, Log Loss: {log_loss:.4f}")
  baseline_difference:
    simple_statistical:
      brier_baseline: 0.2342
      brier_prediction: 0.3078
      brier_delta: 0.0736
      log_loss_baseline: 0.4943
      log_loss_prediction: 0.5978
      log_loss_delta: 0.1035
      note: >
        Prediction slightly underperformed the simple statistical baseline (FIFA ranking
        logistic model). The baseline gave higher home_win probability (0.61 vs 0.55)
        which proved more accurate. The prediction's conservatism (lower home_win P)
        reflected opening-match uncertainty noted in uncertainty_notes, but Mexico's
        home advantage at Estadio Azteca was even stronger than the model anticipated.
        Both Brier and Log Loss differences favor the baseline.
    market_or_odds: null

