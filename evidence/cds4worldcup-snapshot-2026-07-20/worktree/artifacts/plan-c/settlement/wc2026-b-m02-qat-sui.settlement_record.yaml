  - "3/3 draw selection is NOT cherry-picking: this card was locked at 2026-06-13T18:00:00Z, before kickoff (2026-06-13T23:00:00Z), so the draw outcome could not be known at lock time. The 3/3 (100%) draw rate across the three Plan C cards does NOT represent the population draw rate: Matchday 1 (n=24 matches) drew 9 (37.5% ≈ 38%, per wiki/index.md 2026-06-18 MD1 evaluation memo). The 3/3 draw concentration is an ex-ante accidental over-representation of the MD1 'systematic draw underestimation' failure mode, not a population estimate (reviewer audit R6)."
