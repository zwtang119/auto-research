protocol_failures:
  - failure_id: "wc2026-c-m01-bra-mar-pf01-factor-thresholds-not-bridging-mid-range"
    factor_affected: "wc2026-c-m01-bra-mar-f01-bra-shot-volume, wc2026-c-m01-bra-mar-f02-mar-defensive-block, wc2026-c-m01-bra-mar-f03-bra-defense-gaps"
    severity: "minor"
    description: >
      All three Plan C factors for this match had threshold definitions with gaps:
      f01 defined <= 8 (reject) and >= 14 (support) — the 9-13 range is silent;
      f02 defined <= 4 (support) and >= 7 (reject) — the 5-6 range is silent;
      f03 defined <= 2 (reject) and >= 4 (support) — the 3-case is silent.
      Actual observations (13, 5, 3) all fell into these silent gaps. This is a
      calibration-of-thresholds limitation: factors are binary but match
      statistics are continuous, and threshold gaps produce systematic
      inconclusive outcomes in the mid-range.
    resolution: >
      All three factors settled as "inconclusive" per strict protocol. The
      match itself provided clear directional signal (e.g., Brazil's 13 shots is
      one short of the support threshold but reflects near-equal shot volume
      with Morocco — atypical for Brazil), but the binary thresholds cannot
      capture it. Recommendation: future factor ledgers should either (a) use
      three-way thresholds with an explicit mid-range outcome (e.g., "partial
      support"), or (b) define continuous observable_proxy fields with a
      calibrated expected value range. This protocol failure is logged but does
      not affect the Brier/Log Loss adjudication, which is independent of factor
      threshold gaps.
    resolved: true

