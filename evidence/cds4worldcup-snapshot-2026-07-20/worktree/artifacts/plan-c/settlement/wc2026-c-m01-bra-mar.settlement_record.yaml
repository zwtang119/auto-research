scores:
  brier: 0.8552
  log_loss: 1.3471
  brier_calculation: >
    Brier Score (multi-class, single observation):
    p = [home_win=0.50, draw=0.26, away_win=0.24]
    o = [home_win=0, draw=1, away_win=0]
    BS = (0.50-0)^2 + (0.26-1)^2 + (0.24-0)^2
       = 0.25 + 0.5476 + 0.0576
       = 0.8552
  log_loss_calculation: >
    Log Loss (multi-class, single observation, epsilon=1e-12):
    LL = -[0*log(0.50+1e-12) + 1*log(0.26+1e-12) + 0*log(0.24+1e-12)]
       = -ln(0.26)
       = -(-1.3471...)
       = 1.3471
  calculation_snippet: |
    # Python verification:
    import math
    p = [0.50, 0.26, 0.24]  # predicted: home_win, draw, away_win
    outcome_index = 1        # draw happened (Brazil 1-1 Morocco)
    # Brier Score
    brier = sum((p[i] - (1 if i == outcome_index else 0))**2 for i in range(3))
    assert abs(brier - 0.8552) < 0.0001, f"Brier mismatch: {brier}"
    # Log Loss
    epsilon = 1e-12
    log_loss = -math.log(p[outcome_index] + epsilon)
    assert abs(log_loss - 1.3471) < 0.001, f"Log Loss mismatch: {log_loss}"
    print(f"Brier: {brier:.4f}, Log Loss: {log_loss:.4f}")
    # Cross-check with src/verify_plan_c_settlement.py
  baseline_difference:
    simple_statistical:
      brier_baseline: 0.8702
      brier_prediction: 0.8552
      brier_delta: -0.0150
      log_loss_baseline: 1.3863
      log_loss_prediction: 1.3471
      log_loss_delta: -0.0392
      note: >
        Both the prediction and the simple statistical baseline missed the draw.
        The prediction was closer to the actual outcome: Brier 0.8552 vs baseline
        0.8702 (Δbrier -0.0150, prediction favored); Log Loss 1.3471 vs baseline
        1.3863 (Δlog_loss -0.0392, prediction favored). The prediction's higher
        draw probability (0.26 vs 0.25) reduced the draw miss slightly, and its
        more balanced home/away split (0.50/0.24) was closer to the actual
        1-1 outcome than the baseline's 0.49/0.26. This is the OPPOSITE direction
        from the mex-rsa and qat-sui precedents — for this match, the prediction
        outperformed the baseline, despite both missing the draw.
    market_or_odds: null

