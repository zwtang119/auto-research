  - "Despite all three factors being inconclusive, the directional evidence is consistent with the prediction card's uncertainty_notes: (a) Morocco's 2022 WC semifinal defensive organization translated into keeping Brazil's shots on target to 5 (modest for Brazil), and (b) Brazil's defensive gaps were exposed — Saibari's 21' goal and Morocco's 3 shots on target show Brazil did not keep a clean sheet."
  - "Brazil's possession was 51% vs Morocco 49% — essentially even. The pre-match uncertainty_note about 'quasi-home atmosphere from the Brazilian diaspora' at MetLife Stadium is consistent with Brazil's narrow possession edge but did not translate into win probability (the actual draw suggests the diaspora effect was more psychological than statistical)."
  - "Brier Score 0.8552 and Log Loss 1.3471 are intermediate in the Plan C settlement range (between mex-rsa 0.3078 and qat-sui 0.9722). This is because the prediction's home_win probability (0.50) is closer to the actual draw than qat-sui's away_win probability (0.61), reducing the squared-error penalty."
  - "This is the only Plan C match where the prediction OUTPERFORMED the simple statistical baseline on both Brier and Log Loss — for mex-rsa and qat-sui, the baseline was better. This is partly an artifact of the threshold-tightness of the baseline (P(home_win)=0.49 vs prediction P(home_win)=0.50 — both essentially 50/50 with low draw probability)."
  - "Two yellow cards for Brazil (Roger Ibañez 43', Casemiro 37' per Wikipedia lineup notes) — Casemiro's booking is notable as he is a key defensive midfielder, possibly affecting his aggressive defending in subsequent matches. No Moroccan yellows; no reds."
  - "Saibari's 21' opener and Vinícius Júnior's 32' equalizer meant the entire scoring was done in the first half. The match settled into a tactical stalemate thereafter, reflected in the even possession (51/49), nearly even shots (13/14), and Brazil's modest shots on target (5)."
  - "No Red Source contamination detected. No schema validation failures."
