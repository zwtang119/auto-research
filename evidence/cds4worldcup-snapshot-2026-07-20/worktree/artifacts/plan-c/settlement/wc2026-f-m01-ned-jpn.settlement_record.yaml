protocol_failures:
  - failure_id: "wc2026-f-m01-ned-jpn-pf01-factor-threshold-gap-jpn-shots-on-target"
    factor_affected: "wc2026-f-m01-ned-jpn-f02-jpn-counter-threat"
    severity: "minor"
    description: >
      Factor f02 defined <= 2 (reject) and >= 4 (support) — the 3-case is
      silent. Actual observation (Japan 3 shots on target) fell exactly in this
      gap. Same protocol limitation documented in bra-mar pf01: binary thresholds
      with a single-integer silent gap produce systematic inconclusive outcomes
      when actual observations land in the gap.
    resolution: >
      Factor settled as "inconclusive" per strict protocol. The directional
      evidence strongly supports Japan's counter-threat factor — 3 shots on
      target producing 2 goals is a 67% conversion rate, far above typical
      international football averages (~30-35%). Recommendation: future factor
      ledgers for shot-volume / conversion-rate factors should use continuous
      observable_proxy fields or define the silent-gap range as "partial support."
    resolved: true

