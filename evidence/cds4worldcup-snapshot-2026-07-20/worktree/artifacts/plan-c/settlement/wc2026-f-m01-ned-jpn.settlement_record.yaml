scores:
  brier: 0.8502
  log_loss: 1.3471
  brier_calculation: >
    Brier Score (multi-class, single observation):
    p = [home_win=0.49, draw=0.26, away_win=0.25]
    o = [home_win=0, draw=1, away_win=0]
    BS = (0.49-0)^2 + (0.26-1)^2 + (0.25-0)^2
       = 0.2401 + 0.5476 + 0.0625
       = 0.8502
  log_loss_calculation: >
    Log Loss (multi-class, single observation, epsilon=1e-12):
    LL = -[0*log(0.49+1e-12) + 1*log(0.26+1e-12) + 0*log(0.25+1e-12)]
       = -ln(0.26)
       = -(-1.3471...)
       = 1.3471
  calculation_snippet: |
    # Python verification:
    import math
    p = [0.49, 0.26, 0.25]  # predicted: home_win, draw, away_win
    outcome_index = 1        # draw happened (Netherlands 2-2 Japan)
    # Brier Score
    brier = sum((p[i] - (1 if i == outcome_index else 0))**2 for i in range(3))
    assert abs(brier - 0.8502) < 0.0001, f"Brier mismatch: {brier}"
    # Log Loss
    epsilon = 1e-12
    log_loss = -math.log(p[outcome_index] + epsilon)
    assert abs(log_loss - 1.3471) < 0.001, f"Log Loss mismatch: {log_loss}"
    print(f"Brier: {brier:.4f}, Log Loss: {log_loss:.4f}")
    # Cross-check with src/verify_plan_c_settlement.py
  baseline_difference:
    simple_statistical:
      brier_baseline: 0.8918
      brier_prediction: 0.8502
      brier_delta: -0.0416
      log_loss_baseline: 1.3863
      log_loss_prediction: 1.3471
      log_loss_delta: -0.0392
      note: >
        Both the prediction and the simple statistical baseline missed the draw.
        The prediction outperformed the baseline: Brier 0.8502 vs 0.8918
        (Δbrier -0.0416, prediction favored); Log Loss 1.3471 vs 1.3863
        (Δlog_loss -0.0392, prediction favored). The prediction's lower
        home_win probability (0.49 vs 0.53) was closer to the actual draw,
        and its slightly higher away_win probability (0.25 vs 0.22) reflected
        the prediction card's pre-match uncertainty note about Japan's
        2022 WC victories over Germany and Spain. Same direction as bra-mar
        (prediction outperformed baseline) but larger magnitude.
    market_or_odds: null

