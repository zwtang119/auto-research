  - "AT&T Stadium's artificial turf (per prediction card uncertainty_note) does not appear to have disadvantaged either team materially — both teams adapted. Japan's J-League experience on artificial surfaces may have provided a small adjustment, but the match outcome is more attributable to Japan's clinical counter-attacking conversion."
