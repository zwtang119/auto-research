  - "Van Dijk was named Man of the Match and scored the opening goal (51'), playing the full 90 minutes (FIFA match report). Summerville scored the second Netherlands goal (64'). Netherlands' three yellow cards went to Van de Ven, Summerville and Depay (FIFA player table); Van Dijk was not booked."
