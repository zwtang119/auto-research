  simple_statistical:
    status: "available"
    method: >
      FIFA ranking positions via logistic model (same method as MVPA fixture).
      Netherlands ranked ~#6 (FIFA Men's World Ranking 2025-11-19),
      Japan ranked ~#16 (FIFA Men's World Ranking 2025-11-19).
      Approximate ranking points: Netherlands ~1790, Japan ~1620.
      Points difference ~+170 (Netherlands higher). FIFA Elo formula (c=600):
      W_e(home) = 1/(10^(-170/600)+1) = 1/(10^(-0.283)+1) ~ 0.657.
      Three-outcome decomposition with base draw rate d=0.25:
      P(home_win) = W_e - 0.5*d = 0.657 - 0.125 = 0.532;
      P(draw) = d = 0.25;
      P(away_win) = 1 - 0.532 - 0.25 = 0.218.
      Note: this baseline does NOT adjust for home advantage. Both teams play
      on neutral ground at AT&T Stadium, Dallas.
    netherlands_fifa_rank: 6
    netherlands_ranking_date: "2025-11-19"
    japan_fifa_rank: 16
    japan_ranking_date: "2025-11-19"
    ranking_source_url: "data/processed/baselines/fifa-ranking-proxy.json"
    estimated_points_difference: 170
    expected_score_home: 0.657
    decomposition_note: "P(win)=0.53; P(draw)=0.25; P(loss)=0.22; no home advantage adjustment"
    probabilities:
      home_win_90m: 0.53
      draw_90m: 0.25
      away_win_90m: 0.22
