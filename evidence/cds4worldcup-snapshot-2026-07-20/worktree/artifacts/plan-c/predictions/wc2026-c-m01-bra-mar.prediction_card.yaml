  simple_statistical:
    status: "available"
    method: >
      FIFA ranking positions via logistic model (same method as MVPA fixture).
      Brazil ranked ~#5 (FIFA Men's World Ranking 2025-11-19),
      Morocco ranked ~#10 (FIFA Men's World Ranking 2025-11-19).
      Approximate ranking points: Brazil ~1830, Morocco ~1710.
      Points difference ~+120 (Brazil higher). FIFA Elo formula (c=600):
      W_e(home) = 1/(10^(-120/600)+1) = 1/(10^(-0.2)+1) ~ 0.613.
      Three-outcome decomposition with base draw rate d=0.25:
      P(home_win) = W_e - 0.5*d = 0.613 - 0.125 = 0.488;
      P(draw) = d = 0.25;
      P(away_win) = 1 - 0.488 - 0.25 = 0.262.
      Note: this baseline does NOT adjust for home advantage. Both teams play
      on neutral ground at MetLife Stadium, New Jersey.
    brazil_fifa_rank: 5
    brazil_ranking_date: "2025-11-19"
    morocco_fifa_rank: 10
    morocco_ranking_date: "2025-11-19"
    ranking_source_url: "data/processed/baselines/fifa-ranking-proxy.json"
    estimated_points_difference: 120
    expected_score_home: 0.613
    decomposition_note: "P(win)=0.49; P(draw)=0.25; P(loss)=0.26; no home advantage adjustment"
    probabilities:
