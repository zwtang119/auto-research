  simple_statistical:
    status: "available"
    method: >
      FIFA ranking positions via logistic model (same method as MVPA fixture).
      Qatar ranked ~#46 (estimated from FIFA ranking proxy inverse normalization),
      Switzerland ranked ~#15 (FIFA Men's World Ranking 2025-11-19).
      Approximate ranking points: Qatar ~1430, Switzerland ~1640.
      Points difference ~-210 (Qatar lower). FIFA Elo formula (c=600):
      W_e(home) = 1/(10^(210/600)+1) = 1/(10^0.35+1) ~ 0.309.
      Three-outcome decomposition with base draw rate d=0.25:
      P(home_win) = W_e - 0.5*d = 0.309 - 0.125 = 0.184;
      P(draw) = d = 0.25;
      P(away_win) = 1 - 0.184 - 0.25 = 0.566.
      Note: this baseline does NOT adjust for home advantage. Both teams play
      on neutral ground at Levi's Stadium, SF Bay Area.
    qatar_fifa_rank: 46
    qatar_ranking_date: "2025-11-19"
    switzerland_fifa_rank: 15
    switzerland_ranking_date: "2025-11-19"
    ranking_source_url: "data/processed/baselines/fifa-ranking-proxy.json"
    estimated_points_difference: -210
    expected_score_home: 0.309
    decomposition_note: "P(win)=0.18; P(draw)=0.25; P(loss)=0.57; no home advantage adjustment"
    probabilities:
      home_win_90m: 0.18
      draw_90m: 0.25
      away_win_90m: 0.57
