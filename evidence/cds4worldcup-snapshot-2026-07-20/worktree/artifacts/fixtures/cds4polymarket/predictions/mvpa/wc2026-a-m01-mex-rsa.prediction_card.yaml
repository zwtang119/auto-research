  simple_statistical:
    status: "available"
    method: >
      FIFA ranking positions via logistic model (same method as Phase -1 smoke test).
      Mexico ranked #15 (1 April 2026), South Africa ranked #61 (22 December 2025).
      Approximate ranking points: Mexico ~1640, South Africa ~1370 (estimated from
      typical FIFA point distribution at these ranks; exact points not archived).
      Points difference ~270. FIFA Elo formula (c=600): W_e = 1/(10^(-270/600)+1) ~ 0.738.
      Three-outcome decomposition with base draw rate d=0.25:
      P(home_win) = W_e - 0.5*d = 0.738 - 0.125 = 0.613;
      P(draw) = d = 0.25;
      P(away_win) = 1 - 0.613 - 0.25 = 0.137.
      Note: this baseline does NOT adjust for home advantage (Mexico at Estadio Azteca,
      2200m altitude, co-host nation opening match), which significantly favors Mexico.
    mexico_fifa_rank: 15
    mexico_ranking_date: "2026-04-01"
    south_africa_fifa_rank: 61
    south_africa_ranking_date: "2025-12-22"
    ranking_source_url: "https://en.wikipedia.org/wiki/Mexico_national_football_team"
    ranking_source_url_2: "https://en.wikipedia.org/wiki/South_Africa_national_football_team"
    estimated_points_difference: 270
    expected_score_home: 0.738
    decomposition_note: "P(win)=0.613; P(draw)=0.25; P(loss)=0.137; no home advantage adjustment"
    probabilities:
      home_win_90m: 0.61
      draw_90m: 0.25
      away_win_90m: 0.14
