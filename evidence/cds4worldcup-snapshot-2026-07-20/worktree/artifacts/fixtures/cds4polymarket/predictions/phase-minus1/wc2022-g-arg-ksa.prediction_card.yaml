      Historical retrospective smoke test — market source not archived for this match.
      Protocol does not require market archival for Phase -1 historical smoke tests.
      This field is kept as missing_with_reason per spec requirement.
  simple_statistical:
    status: "available"
    method: >
      FIFA ranking points difference via FIFA Elo formula (c=600) followed by
      three-outcome decomposition with base draw rate d=0.25.
      P(home_win) = W_e - 0.5*d; P(draw) = d; P(away_win) = 1 - P(home_win) - P(draw).
    fifa_ranking_date: "2022-03-31"
    argentina_rank: 4
    saudi_arabia_rank: 49
    ranking_source_url: "https://en.wikipedia.org/wiki/2022_FIFA_World_Cup_seeding"
    ranking_points_difference_note: >
      Argentina ~1838 pts (rank #4), Saudi Arabia ~1437 pts (rank #49).
      Points difference ~400. FIFA Elo formula: W_e = 1/(10^(-400/600)+1) ≈ 0.82.
      Using October 2022 ranking (last before WC): W_e ≈ 0.785 with Δ≈337.
    expected_score_argentina: 0.785
    decomposition_note: "P(win)=0.785-0.125=0.66; P(draw)=0.25; P(loss)=0.09"
    probabilities:
      home_win_90m: 0.66
      draw_90m: 0.25
      away_win_90m: 0.09
  public_ai:
    status: "not_applicable_smoke_test"

